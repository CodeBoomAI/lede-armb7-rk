name: Build OpenWrt Rk3229

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device to build (ex: hk1mini, generic-rk3229, dsb)'
        required: true
        default: 'hk1mini'
  push:
    branches:
      - main
      - master
      - x-ai
  pull_request:
    branches:
      - main
      - master
      - x-ai

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      TZ: Asia/Jakarta
    strategy:
      matrix:
        device: [hk1mini]
        # Tambahkan device lain jika perlu, misal: [hk1mini, generic-rk3229]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync \
            unzip zlib1g-dev file wget python3

      - name: Cache OpenWrt feeds
        uses: actions/cache@v4
        with:
          path: |
            dl
            build_dir
          key: ${{ runner.os }}-openwrt-${{ hashFiles('feeds.conf.default') }}-${{ hashFiles('.config') }}

      - name: Update & install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Set target device config
        run: |
          echo "CONFIG_TARGET_rockchip_armv7_DEVICE_${{ matrix.device }}=y" > .config
          make defconfig

      - name: Build OpenWrt
        run: |
          make -j$(nproc) || make V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware-${{ matrix.device }}
          path: bin/targets/
