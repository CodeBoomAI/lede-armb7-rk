name: Debug SSH via tmate

on:
  workflow_dispatch:

jobs:
  ssh-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3

      # Optional: Print instructions
      - name: Print SSH Instructions
        run: |
          echo ""
          echo "Jika ingin konek SSH:"
          echo "1. Tunggu sampai muncul link ssh di bawah step Setup tmate session."
          echo "2. Gunakan perintah: ssh -o StrictHostKeyChecking=no -i <private_key> <user>@<host>"
          echo "3. Atau gunakan web shell yang tersedia."
