name: Build Rockchip ARMv7 Firmware with Menuconfig

on:
  workflow_dispatch:
  push:
    branches:
      - hk1mini

jobs:
  build_openwrt:
    name: Build OpenWrt for RK3229 (ARMv7)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CONFIG_URL: "https://raw.githubusercontent.com/CodeBoomAI/lede-armb7-rk/hk1mini/Rk3229-box.config" 
      TARGET_PROFILE: "rk3229-evb"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ===== SESI MENUCONFIG VIA SSH =====
      - name: Setup tmate for Menuconfig
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: tmate_menuconfig
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
          timeout: 120  # Waktu lebih panjang untuk konfigurasi manual

      - name: Setup Basic Environment
        run: |
          sudo apt update && sudo apt install -y --no-install-recommends \
            build-essential libncurses5-dev flex bison libssl-dev python3 python3-pip rsync unzip zip \
            git wget curl bc kmod patch make gcc g++ zlib1g-dev libzstd-dev \
            libncurses5-dev libreadline-dev libssl-dev libelf-dev liblzma-dev \
            libudev-dev libusb-1.0-0-dev libcurl4-openssl-dev

      - name: Clone Source Code
        run: |
          git clone --depth=1 --branch hk1mini https://github.com/CodeBoomAI/lede-armb7-rk  openwrt

      - name: Update & Install Feeds
        working-directory: ./openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ===== LANGKAH MENUCONFIG =====
      - name: Prepare for Menuconfig
        if: ${{ github.event_name == 'workflow_dispatch' }}
        working-directory: ./openwrt
        run: |
          # Unduh config dasar jika ada
          if [ -n "$CONFIG_URL" ]; then
            curl -sL "$CONFIG_URL" -o .config
          fi
          
          # Inisialisasi config jika belum ada
          if [ ! -f .config ]; then
            make defconfig
          fi

      # ===== INSTRUKSI MENUCONFIG =====
      - name: Menuconfig Instructions
        if: ${{ github.event_name == 'workflow_dispatch' && steps.tmate_menuconfig.outputs.ssh }}
        run: |
          echo "================================================"
          echo "🚀 UNTUK MENJALANKAN MENUCONFIG:"
          echo "1. SSH ke runner: ${{ steps.tmate_menuconfig.outputs.ssh }}"
          echo "2. Masuk ke direktori: cd openwrt"
          echo "3. Jalankan: make menuconfig"
          echo "4. Konfigurasi sesuai kebutuhan"
          echo "5. Tekan 'Save' sebelum keluar"
          echo "6. Keluar dari menuconfig (jangan exit SSH dulu)"
          echo "7. Kembali ke workflow ini dan tekan ENTER"
          echo "================================================"
          read -p "Tekan ENTER setelah selesai menuconfig..." 
        shell: bash

      # ===== LANJUTKAN PROSES BUILD =====
      - name: Download and Apply Config
        working-directory: ./openwrt
        run: |
          # Hanya jalankan jika bukan trigger manual atau config belum diatur
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ ! -f .config ]; then
            echo "📥 Mengunduh Rk3229-box.config..."
            curl -sL "$CONFIG_URL" -o .config

            echo "🔧 Membersihkan konfigurasi lama..."
            sed -i '/CONFIG_TARGET_/d' .config
            sed -i '/CONFIG_TARGET_BOARD/d' .config
            sed -i '/CONFIG_TARGET_SUBTARGET/d' .config
            sed -i '/CONFIG_TARGET_PROFILE/d' .config
            sed -i '/CONFIG_TARGET_ARCH_PACKAGES/d' .config

            echo "🔧 Menetapkan target Rockchip ARMv7..."
            echo "CONFIG_TARGET_rockchip=y" >> .config
            echo "CONFIG_TARGET_rockchip_armv7=y" >> .config
            echo "CONFIG_TARGET_rockchip_armv7_DEVICE_${TARGET_PROFILE}=y" >> .config
            echo "CONFIG_KERNEL_PATCHVER=\"6.6\"" >> .config
            echo "CONFIG_LINUX_6_6=y" >> .config
          fi

          make defconfig

      - name: 🔍 Validasi Target Build
        id: validate_config
        continue-on-error: false
        working-directory: ./openwrt
        run: |
          echo "🔍 Memvalidasi apakah .config sudah benar untuk RK3229 ARMv7..."

          if grep -q 'CONFIG_TARGET_rockchip=y' .config && \
             grep -q 'CONFIG_TARGET_rockchip_armv7=y' .config && \
             grep -q "CONFIG_TARGET_rockchip_armv7_DEVICE_${TARGET_PROFILE}=y" .config; then
            echo "✅ Target config valid: rockchip/armv7/${TARGET_PROFILE}"
          else
            echo "❌ Target config salah!"
            echo "Harus memiliki:"
            echo "  CONFIG_TARGET_rockchip=y"
            echo "  CONFIG_TARGET_rockchip_armv7=y"
            echo "  CONFIG_TARGET_rockchip_armv7_DEVICE_rk3229-evb=y"
            echo ""
            echo "Isi .config saat ini:"
            cat .config | grep CONFIG_TARGET_
            exit 1
          fi

      - name: Stop Build Jika Salah Target
        if: failure()
        run: |
          echo "🛑 Build dibatalkan karena .config salah target."
          exit 1

      # ===== DEBUG JIKA GAGAL =====
      - name: Setup tmate debug session (On Failure)
        if: ${{ failure() }}
        uses: mxschmitt/action-tmate@v3

      - name: Build Firmware
        if: success()
        working-directory: ./openwrt
        run: |
          make download -j$(nproc)
          make V=s -j$(nproc)

      - name: Upload Firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Rockchip_ARMv7_Firmware
          path: ./openwrt/bin/targets/rockchip/armv7/*.img

      # ===== SIMPAN CONFIG HASIL MENUCONFIG =====
      - name: Save Custom Config
        if: ${{ github.event_name == 'workflow_dispatch' && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: custom-config
          path: ./openwrt/.config
