name: Build HK1Mini with SSH Debug

on:
  push:
    branches: [ hk1mini ]
  pull_request:
    branches: [ hk1mini ]
  workflow_dispatch:   # Diperlukan untuk trigger manual

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Timeout keseluruhan job

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev \
          libssl-dev libelf-dev bison flex dwarves zlib1g-dev \
          git make gcc g++ python3 rsync

      - name: Build kernel
        run: |
          export ARCH=arm
          export CROSS_COMPILE=arm-linux-gnueabihf-
          make hk1mini_defconfig
          make -j$(nproc) bindeb-pkg

      # ===== SSH Debug Session =====
      - name: Setup tmate debug session
        id: tmate
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true  # Hanya user yang memicu bisa akses
          timeout: 60  # Auto timeout setelah 60 menit (bisa disesuaikan)
        if: ${{ failure() || github.event_name == 'workflow_dispatch' }}

      # ===== Upload Artifacts =====
      - name: Upload kernel packages
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: kernel-debs
          path: ../*.deb
          retention-days: 3

      # ===== Notifikasi =====
      - name: Notify on failure
        if: ${{ failure() }}
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚨 Build failed! SSH Debug: ${{ steps.tmate.outputs.ssh }}'
            })
