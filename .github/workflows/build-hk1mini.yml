name: Build HK1Mini RK3229

on:
  push:
    branches: [ rk32 ]
  pull_request:
    branches: [ rk32 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget python3-pyelftools

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate .config for HK1Mini RK3229
        run: |
          cp config/hk1mini_rk3229_defconfig .config
          make defconfig

      - name: Show .config
        run: cat .config 

      - name: Check .config for armv7/rk3229
        run: |
          if ! grep -q 'CONFIG_TARGET_rockchip_armv7=y' .config; then
            echo "::error ::CONFIG_TARGET_rockchip_armv7 not set in .config"
            exit 1
          fi
          if ! grep -q 'CONFIG_TARGET_ROCKCHIP_ARMV7_DEVICE_HK1MINI=y' .config; then
            echo "::error ::CONFIG_TARGET_ROCKCHIP_ARMV7_DEVICE_HK1MINI not set in .config"
            exit 1
          fi
          echo "Target config OK"

      - name: Download sources
        run: make download -j8

      - name: Build firmware
        run: make -j$(nproc) V=s

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: hk1mini-rk3229-firmware
          path: bin/targets/